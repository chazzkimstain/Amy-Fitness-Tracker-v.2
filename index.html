// ============================================================
// TOPBAR
// ============================================================
function renderTopbar() {
  let title = '';
  let sub = '';
  if (state.view === 'day') {
    const d = state.cursor;
    title = d.toLocaleDateString('en-US', { weekday: 'long' });
    sub = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  } else if (state.view === 'week') {
    const s = startOfWeek(state.cursor), e = endOfWeek(state.cursor);
    title = 'Week of';
    sub = `${s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${e.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
  } else {
    title = state.cursor.toLocaleDateString('en-US', { month: 'long' });
    sub = state.cursor.toLocaleDateString('en-US', { year: 'numeric' });
  }
  return `
    <header class="topbar">
      <div class="topbar-left">
        <div>
          <h1>${title}</h1>
          ${sub ? `<div class="sub">${sub}</div>` : ''}
        </div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" data-action="prev" title="Previous">${I.prev}</button>
        <button class="icon-btn" data-action="today" title="Today">${I.today}</button>
        <button class="icon-btn" data-action="next" title="Next">${I.next}</button>
      </div>
    </header>
  `;
}
function wireTopbar() {
  document.querySelectorAll('.topbar [data-view]').forEach(btn => {
    btn.onclick = () => { state.view = btn.dataset.view; render(); };
  });
  document.querySelectorAll('.topbar [data-action]').forEach(btn => {
    btn.onclick = () => {
      const a = btn.dataset.action;
      if (a === 'today') {
        state.cursor = new Date(); // works for all views — cursor lands on today, view context handles the rest
      }
      else if (a === 'prev') {
        if (state.view === 'day') state.cursor = addDays(state.cursor, -1);
        else if (state.view === 'week') state.cursor = addDays(state.cursor, -7);
        else state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() - 1, 1);
      } else if (a === 'next') {
        if (state.view === 'day') state.cursor = addDays(state.cursor, 1);
        else if (state.view === 'week') state.cursor = addDays(state.cursor, 7);
        else state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() + 1, 1);
      }
      render();
    };
  });
}

// ============================================================
// DAY VIEW
// ============================================================
function renderDay() {
  const d = state.cursor;
  const dk = dateKey(d);
  const workouts = getWorkoutsForDate(d);
  const auto = generateWorkoutForDate(d);

  // Pre-program: still show the welcome card, but allow custom workouts
  if (auto.type === 'pre-program' && workouts.filter(w => !w.isAuto).length === 0) {
    return `
      <div class="rest-card">
        <h2>Program starts May 4</h2>
        <p>The plan kicks off on Monday, May 4, 2026. Use this time to rest, buy a swimcap, and visualize the months ahead.</p>
      </div>
      ${renderAddWorkoutBar(d)}
      ${renderNotesSection(dk)}
    `;
  }

  // Header
  const headerTitle = workouts.length === 0
    ? 'No workouts'
    : (workouts.length === 1 ? (workouts[0].title || workoutKindLabel(workouts[0])) : `${workouts.length} workouts today`);

  let body = '';
  if (workouts.length === 0) {
    body = `<div class="empty-day-card"><h3>Nothing scheduled.</h3><p>Add a workout below or take it easy today.</p></div>`;
  } else {
    body = workouts.map(w => renderWorkoutBlock(w, d, dk)).join('');
  }

  return `
    <div class="day-header">
      <div class="day-title-block">
        ${auto.week >= 1 && auto.week <= 22 ? `<div class="date-line">Week ${auto.week} of 22</div>` : ''}
        <div class="workout-title">${headerTitle}</div>
      </div>
    </div>
    ${body}
    ${renderAddWorkoutBar(d)}
    ${renderNotesSection(dk)}
  `;
}

function workoutKindLabel(w) {
  if (w.type === 'rest') return 'Rest day';
  if (w.type === 'lift' || w.kind === 'lift') return w.title || 'Lift';
  if (w.type === 'cardio' || w.kind === 'run' || w.kind === 'swim') return w.title || (w.category === 'run' || w.kind === 'run' ? 'Run' : 'Swim');
  if (w.kind === 'other') return w.title || 'Other';
  return w.title || 'Workout';
}

function renderAddWorkoutBar(date) {
  return `
    <button class="add-workout-bar" data-add-workout>
      <span class="add-workout-icon">${I.plus}</span>
      <span>Add a workout</span>
    </button>
  `;
}

// Render one workout block (auto or custom). For rest day auto, just show the rest card.
function renderWorkoutBlock(w, d, dk) {
  const wKey = w.workoutKey;
  const compKey = workoutCompletionKey(dk, wKey);
  const completed = !!state.completions[compKey];

  // Special: rest day from auto-generator
  if (w.type === 'rest' && w.isAuto) {
    const msg = (typeof getRestDayMessage === 'function') ? getRestDayMessage(d) : { title: 'Rest day', body: 'Take it easy today.' };
    return `
      <div class="workout-block">
        <div class="workout-block-actions">
          <button class="block-action" data-delete-workout="${wKey}" title="Hide rest day">${I.trash}</button>
        </div>
        <div class="rest-card">
          <h2>${msg.title}</h2>
          <p>${msg.body}</p>
        </div>
      </div>
    `;
  }

  // Custom rest? not allowed; treat like other.
  // Determine kind for header pill
  const kind = w.type === 'lift' ? 'lift' : (w.type === 'cardio' ? w.category : (w.kind || 'other'));

  let bodyHtml = '';
  if (w.type === 'lift' || w.kind === 'lift') {
    const exercises = w.exercises || [];
    bodyHtml = `
      ${w.isAuto ? `
        <div class="warmup-card">
          <div class="ico-circle">${I.walk}</div>
          <div class="text-block">
            <div class="label">10-minute incline walk</div>
            <div class="meta">Treadmill, 3.0 mph, incline 15.</div>
          </div>
        </div>` : ''}
      <div class="exercise-stack">
        ${exercises.map((exId, idx) => renderExerciseCard(exId, idx, dk, wKey, completed)).join('')}
        <button class="add-exercise-btn" data-add-exercise="${wKey}">${I.plus}<span>Add an exercise</span></button>
      </div>
    `;
  } else if (w.type === 'cardio' || w.kind === 'run' || w.kind === 'swim') {
    bodyHtml = renderCardioCard(w, completed, dk);
  } else if (w.kind === 'other') {
    bodyHtml = renderCustomOtherCard(w, completed);
  }

  return `
    <div class="workout-block ${kind === 'other' ? 'kind-other' : ''}">
      <div class="workout-block-header">
        <div class="workout-block-titles">
          <div class="workout-block-pills">
            <span class="pill ${kind}">${kindLabel(kind, w)}</span>
            ${w.isAuto ? '<span class="pill-faint">scheduled</span>' : '<span class="pill-faint">custom</span>'}
          </div>
          <div class="workout-block-name">${w.title || workoutKindLabel(w)}</div>
        </div>
        <div class="workout-block-actions">
          <button class="block-action" data-edit-workout="${wKey}" title="Edit">${I.edit}</button>
          <button class="block-action" data-move-workout="${wKey}" title="Move to another day">${I.move}</button>
          <button class="block-action" data-delete-workout="${wKey}" title="${w.isAuto ? 'Hide' : 'Delete'}">${I.trash}</button>
        </div>
      </div>
      ${bodyHtml}
      ${renderCompleteBar(compKey, completed, w, wKey, d)}
    </div>
  `;
}

function kindLabel(kind, w) {
  if (kind === 'lift') return 'Lift';
  if (kind === 'run') return 'Run';
  if (kind === 'swim') return 'Swim';
  if (kind === 'other') return 'Other';
  if (kind === 'rest') return 'Rest';
  return w.title || 'Workout';
}

// Custom "other" workout card
function renderCustomOtherCard(w, completed) {
  return `
    <div class="cardio-card other ${completed ? 'completed' : ''}">
      ${completed ? `<div class="completion-stamp">${I.check}</div>` : ''}
      <div class="cardio-head">
        <div class="title-block">
          <div class="type">Custom</div>
          <div class="main-title">${w.title || 'Workout'}</div>
        </div>
      </div>
      ${w.details ? `<div class="cardio-notes">${(w.details + '').replace(/</g, '&lt;')}</div>` : ''}
    </div>
  `;
}

function renderExerciseCard(exId, idx, dk, wKey, dayCompleted) {
  // Support both library exercises and custom exercises (prefix: cx_)
  const isCustom = exId.startsWith('cx_');
  const def = isCustom ? (state.customExerciseDefs[exId] || { name: 'Custom Exercise', sets: 3, reps: 10, primary: 'Custom', machine: '—', description: '', weightIncrement: 0 })
                       : EXERCISE_LIBRARY[exId];
  if (!def) return '';

  const compKey = workoutCompletionKey(dk, wKey);
  const expandedKey = `${wKey}|${idx}`;
  const expanded = state.expandedExercise === expandedKey;
  const fb = (state.feedback[compKey] || {})[exId];
  const weight = isCustom ? 0 : getCurrentWeight(exId);
  const showsWeight = !isCustom && def.weightIncrement > 0;
  const exDone = !!((state.exerciseCompletions[compKey] || {})[idx]);

  // Set/rep overrides
  const overrideKey = `${dk}|${wKey}|${exId}`;
  const override = state.exerciseSetOverrides[overrideKey];
  const sets = override ? override.sets : def.sets;
  const reps = override ? override.reps : def.reps;

  const stamp = (dayCompleted || exDone) ? `<div class="completion-stamp">${I.check}</div>` : '';
  const cardClasses = ['exercise-card'];
  if (expanded) cardClasses.push('expanded');
  if (dayCompleted || exDone) cardClasses.push('completed');
  if (isCustom) cardClasses.push('custom-exercise');

  return `
    <div class="${cardClasses.join(' ')}" data-ex-idx="${idx}" data-w-key="${wKey}" style="animation-delay:${idx * 45}ms">
      ${stamp}
      <div class="exercise-head">
        <button class="ex-checkbox ${exDone ? 'checked' : ''}" data-toggle-ex-complete="${wKey}|${idx}" title="Mark exercise done">
          ${exDone ? I.check : ''}
        </button>
        <div class="ex-toggle-region" data-toggle-ex="${expandedKey}">
          <div class="ex-num">${idx + 1}</div>
          <div class="ex-titles">
            <div class="ex-title">${def.name}${isCustom ? ' <span class="custom-badge">custom</span>' : ''}</div>
            <div class="ex-sub">${def.primary || ''}</div>
          </div>
          <div class="ex-stats">
            <div class="stat"><div class="val">${sets} × ${reps}</div><div class="lab">Sets × Reps</div></div>
            ${showsWeight ? `<div class="stat"><div class="val">${weight} ${def.units || 'lb'}</div><div class="lab">Weight</div></div>` : ''}
          </div>
          ${I.chev}
        </div>
      </div>
      <div class="exercise-body">
        ${!isCustom && def.machine ? `
        <div class="body-section">
          <div class="label">Setup &amp; weight</div>
          <div class="text">${def.machine}${def.weightLoading ? ' ' + def.weightLoading : ''}</div>
        </div>` : ''}
        ${(() => {
          if (isCustom) return '';
          const breakdown = repBreakdown(def);
          return breakdown ? `
            <div class="body-section">
              <div class="label">Rep breakdown</div>
              <div class="text">${breakdown}</div>
            </div>` : '';
        })()}
        ${def.description ? `
        <div class="body-section">
          <div class="label">${isCustom ? 'Notes' : 'How To'}</div>
          <div class="text">${def.description}</div>
        </div>` : ''}
        ${def.video ? `
          <div class="body-section">
            <a class="video-link" href="${def.video}" target="_blank" rel="noopener">${I.play} Video demo</a>
          </div>` : ''}

        <!-- Editable sets & reps — custom exercises only -->
        ${isCustom ? `
        <div class="body-section">
          <div class="label">Sets &amp; reps</div>
          <div class="ex-sets-editor" data-override-key="${overrideKey}">
            <div class="ex-sets-row">
              <span class="ex-sets-label">Sets</span>
              <button class="icon-btn" data-sets-down="${overrideKey}|${sets}|${reps}">${I.minus}</button>
              <span class="ex-sets-val">${sets}</span>
              <button class="icon-btn" data-sets-up="${overrideKey}|${sets}|${reps}">${I.plus}</button>
            </div>
            <div class="ex-sets-row">
              <span class="ex-sets-label">Reps</span>
              <button class="icon-btn" data-reps-down="${overrideKey}|${sets}|${reps}">${I.minus}</button>
              <span class="ex-sets-val">${reps}</span>
              <button class="icon-btn" data-reps-up="${overrideKey}|${sets}|${reps}">${I.plus}</button>
            </div>
          </div>
        </div>` : ''}

        ${showsWeight ? `
          <div class="body-section">
            <div class="label">Today's weight</div>
            <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
              <button class="icon-btn" data-weight-down="${exId}">${I.minus}</button>
              <span class="weight-display" data-weight-display="${exId}" style="font-weight:600;min-width:80px;text-align:center">${weight} ${def.units || 'lb'}</span>
              <button class="icon-btn" data-weight-up="${exId}">${I.plus}</button>
            </div>
          </div>
        ` : ''}
        <div class="feedback-row">
          <span class="label-text">How did it feel?</span>
          <button class="fb-btn ${fb === 'easy' ? 'active' : ''}" data-feedback="${wKey}|${exId}|easy">Easy</button>
          <button class="fb-btn ${fb === 'right' ? 'active' : ''}" data-feedback="${wKey}|${exId}|right">Just right</button>
          <button class="fb-btn ${fb === 'hard' ? 'active' : ''}" data-feedback="${wKey}|${exId}|hard">Hard</button>
        </div>
        <div class="ex-remove-row">
          <button class="ex-remove-btn" data-remove-ex="${wKey}|${idx}">${I.trash}<span>Remove from this workout</span></button>
        </div>
      </div>
    </div>
  `;
}

function renderCardioCard(w, completed, dk) {
  const isSwim = w.category === 'swim' || w.kind === 'swim';
  const isRun = w.category === 'run' || w.kind === 'run';
  const cat = isSwim ? 'swim' : 'run';

  // Apply cardio progression to the displayed plan
  let p = w.plan;
  if (p && (isRun || isSwim)) {
    p = applyCardioProgressionToPlan(cat, p);
  }
  if (!p) return '<div class="cardio-card"><div class="cardio-notes">No plan details.</div></div>';

  // For swims: get effective sets (user-edited or default), compute total
  const editKey = `${dk}|${w.workoutKey}`;
  let effectiveSets = null;
  if (isSwim && Array.isArray(p.sets)) {
    effectiveSets = state.swimSetEdits[editKey] || p.sets.map(s => {
      if (typeof s === 'string') {
        const m = s.match(/(\d+)\s*[×x]\s*(\d+)\s*yd/);
        if (m) return { reps: parseInt(m[1]), distance: `${m[2]} yd`, stroke: 'Breaststroke' };
        const single = s.match(/(\d+)\s*yd/);
        if (single) return { reps: 1, distance: `${single[1]} yd`, stroke: 'Breaststroke' };
        return { reps: 1, distance: s, stroke: 'Breaststroke' };
      }
      return { reps: s.reps || 1, distance: s.distance || '0 yd', stroke: s.stroke || 'Breaststroke' };
    });
  }
  const swimTotal = effectiveSets ? effectiveSets.reduce((sum, s) => {
    const m = String(s.distance).match(/(\d+)/);
    return sum + (m ? parseInt(m[1]) * (s.reps || 1) : 0);
  }, 0) : null;

  const distance = isSwim ? (swimTotal != null ? `${swimTotal} yd` : (p.totalDistance || p.distance)) : p.distance;
  const fb = state.cardioFeedback[dk] && state.cardioFeedback[dk][w.workoutKey];

  return `
    <div class="cardio-card ${cat} ${completed ? 'completed' : ''}">
      ${completed ? `<div class="completion-stamp">${I.check}</div>` : ''}
      <div class="cardio-head">
        <div class="title-block">
          <div class="type">${isSwim ? 'Swim Day' : 'Run Day'}</div>
          <div class="main-title">${p.type || (isSwim ? 'Swim' : 'Run')}</div>
        </div>
      </div>
      <div class="cardio-grid">
        <div class="stat"><div class="lab">${isSwim ? 'Total' : 'Distance'}</div><div class="val">${distance || '—'}</div></div>
        <div class="stat"><div class="lab">Pace</div><div class="val">${p.pace || '—'}</div></div>
        <div class="stat"><div class="lab">Duration</div><div class="val">${p.duration || '—'}</div></div>
      </div>
      ${isSwim && effectiveSets ? `
        <div class="cardio-sets">
          <div class="cardio-sets-label">Set splits</div>
          <div class="swim-sets-editor" data-swim-edit-key="${editKey}">
            ${effectiveSets.map((s, idx) => {
              const strokes = ['Breaststroke','Backstroke','Freestyle','Butterfly','IM'];
              const strokeOpts = strokes.map(st =>
                `<option value="${st}" ${(s.stroke||'Breaststroke')===st?'selected':''}>${st}</option>`
              ).join('');
              return `
              <div class="swim-set-row" data-set-idx="${idx}">
                <input class="swim-reps" type="number" min="1" max="99" value="${s.reps || 1}" data-set-field="reps"/>
                <span class="swim-x">×</span>
                <input class="swim-dist" type="number" min="25" step="25" value="${(String(s.distance).match(/(\d+)/) || ['',0])[1]}" data-set-field="distance"/>
                <span class="swim-unit">yd</span>
                <select class="swim-stroke" data-set-field="stroke">${strokeOpts}</select>
                <button class="swim-remove" data-set-remove title="Remove">${I.minus}</button>
              </div>`;
            }).join('')}
            <button class="swim-add-set" data-set-add>${I.plus}<span>Add a set</span></button>
          </div>
        </div>` : ''}
      ${p._offsetNote ? `<div class="cardio-progress-note">${p._offsetNote}</div>` : ''}
      <div class="feedback-row cardio-feedback">
        <span class="label-text">How did this feel?</span>
        <button class="fb-btn ${fb === 'easy' ? 'active' : ''}" data-cardio-feedback="${w.workoutKey}|easy">Easy</button>
        <button class="fb-btn ${fb === 'right' ? 'active' : ''}" data-cardio-feedback="${w.workoutKey}|right">Just right</button>
        <button class="fb-btn ${fb === 'hard' ? 'active' : ''}" data-cardio-feedback="${w.workoutKey}|hard">Hard</button>
      </div>
    </div>
  `;
}

function renderCompleteBar(compKey, completed, w, wKey, date) {
  if (w.type === 'rest' || w.type === 'pre-program') return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  const isFuture = d > today;
  const isPast = d < today;
  const fmtDate = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  if (isFuture && !completed) {
    return `
      <div class="complete-bar future-gated">
        <div class="left">
          <div class="label">Not available yet</div>
          <div class="meta">You can log this on ${fmtDate}.</div>
        </div>
        <button class="btn-primary" disabled style="opacity:0.38;cursor:not-allowed">Mark Complete</button>
      </div>
    `;
  }

  return `
    <div class="complete-bar ${completed ? 'completed' : ''}">
      <div class="left">
        <div class="label">${completed ? 'Workout complete' : 'Mark this workout complete'}</div>
        <div class="meta">${completed ? 'Nice work today.' : 'When you finish, tap the button to log it.'}</div>
      </div>
      ${completed
        ? `<button class="btn-secondary" data-undo-complete="${wKey}">Undo</button>`
        : `<button class="btn-primary" data-mark-complete="${wKey}" ${isPast ? 'data-retroactive="1"' : ''}>Mark Complete</button>`}
    </div>
  `;
}

function renderNotesSection(dk) {
  const notes = state.notes[dk] || '';
  const hasNotes = notes.trim().length > 0;
  const open = state.notesOpen || hasNotes;
  return `
    <div class="notes-section ${open ? 'open' : ''}">
      <div class="notes-head ${hasNotes ? 'has-notes' : ''}" data-toggle-notes>
        <div class="left">
          ${I.pen.replace('class="icon"', 'class="icon-pen"')}
          <span class="label">Notes</span>
          ${hasNotes ? '<span class="sub">— added</span>' : '<span class="sub">— none yet</span>'}
        </div>
        ${I.chev}
      </div>
      <div class="notes-body">
        <textarea class="notes-textarea" data-notes-input placeholder="Anything to remember about today's session — how you felt, what to try next time, a small win, anything…">${notes.replace(/</g, '&lt;')}</textarea>
      </div>
    </div>
  `;
}

function wireDay() {
  // Toggle exercise expansion — smooth DOM-only, no full re-render
  document.querySelectorAll('[data-toggle-ex]').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.toggleEx;
      const wasOpen = state.expandedExercise === key;
      state.expandedExercise = wasOpen ? null : key;

      // Close all exercise bodies smoothly
      document.querySelectorAll('.exercise-card').forEach(card => {
        const body = card.querySelector('.exercise-body');
        const chev = card.querySelector('.chev');
        if (!body) return;
        card.classList.remove('expanded');
        body.style.maxHeight = '0';
        if (chev) chev.style.transform = '';
      });

      // Open the clicked one if it wasn't already open
      if (!wasOpen) {
        const targetCard = el.closest('.exercise-card');
        if (targetCard) {
          const body = targetCard.querySelector('.exercise-body');
          const chev = targetCard.querySelector('.chev');
          targetCard.classList.add('expanded');
          if (body) body.style.maxHeight = body.scrollHeight + 200 + 'px';
          if (chev) chev.style.transform = 'rotate(180deg)';
        }
      }
      saveState();
    };
  });

  // Per-exercise mark complete — targeted DOM update, no flash
  document.querySelectorAll('[data-toggle-ex-complete]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const [wKey, idxStr] = btn.dataset.toggleExComplete.split('|');
      const idx = parseInt(idxStr);
      const dk = dateKey(state.cursor);
      const compKey = workoutCompletionKey(dk, wKey);
      if (!state.exerciseCompletions[compKey]) state.exerciseCompletions[compKey] = {};
      const nowDone = !state.exerciseCompletions[compKey][idx];
      if (nowDone) {
        state.exerciseCompletions[compKey][idx] = true;
      } else {
        delete state.exerciseCompletions[compKey][idx];
      }
      saveState();

      // Update checkbox and card class in-place
      btn.classList.toggle('checked', nowDone);
      btn.innerHTML = nowDone ? I.check : '';
      const card = btn.closest('.exercise-card');
      if (card) card.classList.toggle('completed', nowDone);
      const stamp = card?.querySelector('.completion-stamp');
      if (stamp) stamp.style.display = nowDone ? '' : 'none';
      else if (nowDone && card) {
        const s = document.createElement('div');
        s.className = 'completion-stamp';
        s.innerHTML = I.check;
        card.prepend(s);
      }
    };
  });

  // Per-exercise feedback
  document.querySelectorAll('[data-feedback]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const [wKey, exId, fb] = btn.dataset.feedback.split('|');
      const dk = dateKey(state.cursor);
      const compKey = workoutCompletionKey(dk, wKey);
      if (!state.feedback[compKey]) state.feedback[compKey] = {};
      state.feedback[compKey][exId] = fb;
      saveState();
      render();
    };
  });

  // Cardio-level feedback
  document.querySelectorAll('[data-cardio-feedback]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const [wKey, fb] = btn.dataset.cardioFeedback.split('|');
      const dk = dateKey(state.cursor);
      if (!state.cardioFeedback[dk]) state.cardioFeedback[dk] = {};
      state.cardioFeedback[dk][wKey] = fb;
      saveState();
      render();
    };
  });

  // Swim set editor
  document.querySelectorAll('.swim-sets-editor').forEach(editor => {
    const editKey = editor.dataset.swimEditKey;
    const readSets = () => {
      const rows = editor.querySelectorAll('.swim-set-row');
      const sets = [];
      rows.forEach(r => {
        const reps = parseInt(r.querySelector('[data-set-field="reps"]').value) || 1;
        const dist = parseInt(r.querySelector('[data-set-field="distance"]').value) || 0;
        const strokeEl = r.querySelector('[data-set-field="stroke"]');
        const stroke = strokeEl ? strokeEl.value : 'Breaststroke';
        if (dist > 0) sets.push({ reps, distance: `${dist} yd`, stroke });
      });
      return sets;
    };
    const saveAndRender = () => {
      state.swimSetEdits[editKey] = readSets();
      saveState();
      render();
    };
    editor.querySelectorAll('input, select').forEach(inp => {
      inp.onchange = saveAndRender;
    });
    editor.querySelectorAll('[data-set-remove]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const row = btn.closest('.swim-set-row');
        if (!row) return;
        const allRows = [...editor.querySelectorAll('.swim-set-row')];
        const idx = allRows.indexOf(row);
        const sets = readSets();
        sets.splice(idx, 1);
        state.swimSetEdits[editKey] = sets;
        saveState();
        render();
      };
    });
    const addBtn = editor.querySelector('[data-set-add]');
    if (addBtn) {
      addBtn.onclick = (e) => {
        e.stopPropagation();
        const sets = readSets();
        sets.push({ reps: 1, distance: '50 yd', stroke: 'Breaststroke' });
        state.swimSetEdits[editKey] = sets;
        saveState();
        render();
      };
    }
  });

  // Weight buttons — targeted update only, no full re-render
  document.querySelectorAll('[data-weight-up],[data-weight-down]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const exId = btn.dataset.weightUp || btn.dataset.weightDown;
      const dir  = btn.dataset.weightUp ? 'up' : 'down';
      adjustWeight(exId, dir);
      saveState();
      // Update only the weight display span — no flash
      const def = EXERCISE_LIBRARY[exId];
      const newWeight = getCurrentWeight(exId);
      const units = (def && def.units) || 'lb';
      document.querySelectorAll(`[data-weight-display="${exId}"]`).forEach(el => {
        el.textContent = `${newWeight} ${units}`;
        el.animate([{ opacity: 0.4, transform: 'scale(0.9)' }, { opacity: 1, transform: 'scale(1)' }],
          { duration: 180, easing: 'ease-out' });
      });
      // Also update the collapsed stat chip if visible
      document.querySelectorAll(`[data-ex-idx]`).forEach(card => {
        if (card.querySelector(`[data-weight-display="${exId}"]`)) {
          const chip = card.querySelector('.stat .val');
          if (chip && !chip.closest('.exercise-body')) return; // skip reps chip
        }
      });
    };
  });

  // Mark complete (per workout block)
  document.querySelectorAll('[data-mark-complete]').forEach(btn => {
    btn.onclick = () => {
      const wKey = btn.dataset.markComplete;
      if (btn.dataset.retroactive) {
        const fmtDate = state.cursor.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        confirmDialog(
          'Log past workout?',
          `Are you sure you worked out on ${fmtDate}?`,
          () => completeWorkout(state.cursor, wKey)
        );
      } else {
        completeWorkout(state.cursor, wKey);
      }
    };
  });
  document.querySelectorAll('[data-undo-complete]').forEach(btn => {
    btn.onclick = () => undoCompleteWorkout(state.cursor, btn.dataset.undoComplete);
  });

  // Add workout
  const addBtn = document.querySelector('[data-add-workout]');
  if (addBtn) addBtn.onclick = () => openAddWorkoutModal(state.cursor);

  // Per-block actions: edit/move/delete
  document.querySelectorAll('[data-edit-workout]').forEach(btn => {
    btn.onclick = () => openEditWorkoutModal(state.cursor, btn.dataset.editWorkout);
  });
  document.querySelectorAll('[data-move-workout]').forEach(btn => {
    btn.onclick = () => openMoveWorkoutModal(state.cursor, btn.dataset.moveWorkout);
  });
  document.querySelectorAll('[data-delete-workout]').forEach(btn => {
    btn.onclick = () => openDeleteWorkoutDialog(state.cursor, btn.dataset.deleteWorkout);
  });

  // Remove individual exercise from a workout
  document.querySelectorAll('[data-remove-ex]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const [wKey, idxStr] = btn.dataset.removeEx.split('|');
      const idx = parseInt(idxStr);
      removeExerciseAt(state.cursor, wKey, idx);
      saveState();
      state.expandedExercise = null;
      render();
      toast('Exercise removed.');
    };
  });

  // Add individual exercise to a workout
  document.querySelectorAll('[data-add-exercise]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const wKey = btn.dataset.addExercise;
      openAddExerciseModal(state.cursor, wKey);
    };
  });

  // Sets/reps override buttons
  document.querySelectorAll('[data-sets-up],[data-sets-down],[data-reps-up],[data-reps-down]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const raw = btn.dataset.setsUp || btn.dataset.setsDown || btn.dataset.repsUp || btn.dataset.repsDown;
      const [overrideKey, setsStr, repsStr] = raw.split('|');
      let sets = parseInt(setsStr), reps = parseInt(repsStr);
      if (btn.dataset.setsUp)   sets = Math.min(sets + 1, 20);
      if (btn.dataset.setsDown) sets = Math.max(sets - 1, 1);
      if (btn.dataset.repsUp)   reps = Math.min(reps + 1, 50);
      if (btn.dataset.repsDown) reps = Math.max(reps - 1, 1);
      state.exerciseSetOverrides[overrideKey] = { sets, reps };
      saveState(); render();
    };
  });

  const notesHead = document.querySelector('[data-toggle-notes]');
  if (notesHead) notesHead.onclick = () => { state.notesOpen = !document.querySelector('.notes-section').classList.contains('open'); render(); };

  // Set initial max-height for any already-expanded exercise (no animation on load)
  document.querySelectorAll('.exercise-card.expanded .exercise-body').forEach(body => {
    body.style.transition = 'none';
    body.style.maxHeight = body.scrollHeight + 200 + 'px';
    requestAnimationFrame(() => { body.style.transition = ''; });
    const chev = body.closest('.exercise-card')?.querySelector('.chev');
    if (chev) chev.style.transform = 'rotate(180deg)';
  });

  const notesInput = document.querySelector('[data-notes-input]');
  if (notesInput) {
    notesInput.oninput = (e) => {
      const dk = dateKey(state.cursor);
      state.notes[dk] = e.target.value;
      saveState();
    };
  }
}

// COMPLETE WORKOUT — fireworks, hearts, compliments, unlocks
// ============================================================
const COMPLIMENTS = [
  "Look at you go.",
  "You showed up. That's the whole game.",
  "Strong work. I see you.",
  "Every rep counted today.",
  "You earned that post-workout glow.",
  "That's how it's done. Repeat tomorrow.",
  "Built different. Honestly.",
  "I'm so proud of you.",
  "Future you is sending thank-you notes.",
  "Beast mode unlocked, gracefully.",
  "Your consistency is your superpower.",
  "That's another deposit in the strength bank."
];

function pickCompliment() {
  return COMPLIMENTS[Math.floor(Math.random() * COMPLIMENTS.length)];
}

async function completeWorkout(date, wKey = 'auto') {
  const dk = dateKey(date);
  const compKey = workoutCompletionKey(dk, wKey);
  if (state.completions[compKey]) return;

  // Optimistic update — stamp the UI immediately before any async work
  state.completions[compKey] = true;
  render();

  // Identify the actual workout
  const all = getWorkoutsForDate(date);
  const w = all.find(x => x.workoutKey === wKey);
  if (!w) { await saveState(); return; }

  // Apply feedback-based progression for lifts
  if (w.type === 'lift' || w.kind === 'lift') {
    const fbs = state.feedback[compKey] || {};
    (w.exercises || []).forEach(exId => {
      const fb = fbs[exId];
      if (fb) applyFeedbackProgression(exId, fb);
    });
  }

  // Cardio progression
  if (w.type === 'cardio' || w.kind === 'run' || w.kind === 'swim') {
    const cat = w.category || w.kind;
    const fb = (state.cardioFeedback[dk] || {})[wKey];
    if (fb && (cat === 'run' || cat === 'swim')) {
      applyCardioFeedback(cat, fb);
    }
  }

  // --- Pokémon pack pull ---
  // Award packs for auto workouts AND custom workouts
  const isTrainable = w.type === 'lift' || w.type === 'cardio' ||
                      w.kind === 'lift' || w.kind === 'run' || w.kind === 'swim' || w.kind === 'other';
  if (isTrainable) {
    // Map workout to pack type
    let workoutType;
    if (w.kind === 'swim' || w.category === 'swim')       workoutType = 'swim';
    else if (w.kind === 'run' || w.category === 'run')    workoutType = 'run';
    else if (w.kind === 'lift' || w.type === 'lift')      workoutType = 'lift';
    else                                                   workoutType = 'other'; // 'other' uses run probs

    // Check pity timer (every 10th pack guaranteed rare+)
    const pityDue = (state.packsOpened % 10) === 9;

    // Check first-pack-of-week silent guarantee
    const wkStart = dateKey(startOfWeek(date));
    const firstWeek = !state.weekFirstPackDone[wkStart];

    const guaranteeRare = pityDue || firstWeek;
    if (firstWeek) state.weekFirstPackDone[wkStart] = true;

    // Queue the pack
    state.packsToOpen.push({ workoutType, guaranteeRare, dateKey: dk });
  }

  // Check if this completes all workouts in the Mon-Sun week (weekly bonus)
  if (w.isAuto) {
    const weekStart = startOfWeek(date);
    const wkKey = dateKey(weekStart);
    if (!state.weeklyBonusClaimed[wkKey]) {
      let allComplete = true, weekHasWorkout = false;
      for (let i = 0; i < 7; i++) {
        const dd = addDays(weekStart, i);
        const ww = generateWorkoutForDate(dd);
        if (ww.type === 'lift' || ww.type === 'cardio') {
          weekHasWorkout = true;
          if (!state.completions[workoutCompletionKey(dateKey(dd), 'auto')]) { allComplete = false; break; }
        }
      }
      if (weekHasWorkout && allComplete) {
        state.weeklyBonusClaimed[wkKey] = 'available';
      }
    }
  }

  await saveState();
  render();

  // Determine confetti type from workout
  const celebType = w.category === 'swim' || w.kind === 'swim' ? 'swim'
                  : w.category === 'run'  || w.kind === 'run'  ? 'run'
                  : w.type === 'lift'     || w.kind === 'lift' ? 'lift' : 'other';

  showCelebration(pickCompliment(), () => {
    if (state.packsToOpen.length > 0) setTimeout(() => showNextPack(), 300);
  }, celebType);
}

async function undoCompleteWorkout(date, wKey = 'auto') {
  const dk = dateKey(date);
  const compKey = workoutCompletionKey(dk, wKey);
  if (!state.completions[compKey]) return;
  delete state.completions[compKey];
  await saveState();
  render();
  toast('Marked incomplete.');
}

function showCelebration(compliment, onDismiss, workoutType = 'lift') {
  // Confetti colours matched to workout type
  const confettiPalettes = {
    swim:  ['#3A7BD5','#00D2FF','#6BCCE8','#A8D8F0','#E0F4FF'],
    run:   ['#2ECC71','#1ABC9C','#A8F0D8','#27AE60','#D4EFDF'],
    lift:  ['#E89B5A','#F4B8A0','#F0D080','#E8B4B8','#C8B5D8'],
    other: ['#8E44AD','#C39BD3','#F8C471','#85C1E9','#82E0AA'],
  };
  const colors = confettiPalettes[workoutType] || confettiPalettes.lift;

  // Build overlay
  const overlay = document.createElement('div');
  overlay.className = 'celebration-overlay';

  // Hearts and fireworks layer
  const fxLayer = document.createElement('div');
  fxLayer.className = 'celebration-fx';
  for (let i = 0; i < 8; i++) {
    const fw = document.createElement('div');
    fw.className = 'fw-burst';
    fw.style.left = (10 + Math.random() * 80) + '%';
    fw.style.top = (10 + Math.random() * 70) + '%';
    fw.style.animationDelay = (Math.random() * 0.8) + 's';
    fw.style.setProperty('--burst-color', colors[i % colors.length]);
    // Add 12 particles per firework
    let particles = '';
    for (let p = 0; p < 12; p++) {
      const angle = (p / 12) * 360;
      particles += `<span class="fw-particle" style="--angle:${angle}deg"></span>`;
    }
    fw.innerHTML = particles;
    fxLayer.appendChild(fw);
  }

  // Add 14 hearts floating up at random spots
  for (let i = 0; i < 14; i++) {
    const h = document.createElement('div');
    h.className = 'fx-heart';
    h.style.left = (Math.random() * 100) + '%';
    h.style.animationDelay = (Math.random() * 1.2) + 's';
    h.style.animationDuration = (2.4 + Math.random() * 1.6) + 's';
    h.style.setProperty('--heart-size', (16 + Math.random() * 18) + 'px');
    h.innerHTML = I.heart;
    fxLayer.appendChild(h);
  }

  // Compliment card
  const gifUrl = pickDiemGif();
  const card = document.createElement('div');
  card.className = 'celebration-card';
  card.innerHTML = `
    <div class="celebration-banner">${I.heart} I love you ${I.heart}</div>
    <div class="celebration-gif-wrap">
      <img class="celebration-gif" src="${gifUrl}" alt="celebration" onerror="this.parentElement.style.display='none'"/>
    </div>
    <div class="celebration-compliment">${compliment}</div>
    <div class="celebration-sub">Workout logged. Take a sip of water — you earned it.</div>
  `;

  overlay.appendChild(fxLayer);
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  // Fade in
  requestAnimationFrame(() => overlay.classList.add('visible'));

  // Click anywhere to dismiss
  overlay.addEventListener('click', () => {
    overlay.classList.remove('visible');
    setTimeout(() => { overlay.remove(); if (onDismiss) onDismiss(); }, 300);
  });

  // Auto-dismiss after a bit — give the gif room to play
  setTimeout(() => {
    if (document.body.contains(overlay)) {
      overlay.classList.remove('visible');
      setTimeout(() => { overlay.remove(); if (onDismiss) onDismiss(); }, 300);
    }
  }, 6500);
}

// ============================================================
// WEEK VIEW
// ============================================================
function renderWeek() {
  const start = startOfWeek(state.cursor);
  const today = new Date();
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = addDays(start, i);
    const dk = dateKey(d);
    const workouts = getWorkoutsForDate(d);
    const isToday = isSameDay(d, today);
    const hasNotes = (state.notes[dk] || '').trim().length > 0;
    const dowName = d.toLocaleDateString('en-US', { weekday: 'short' });

    // A day is "all complete" if every non-rest workout is marked complete
    const trainable = workouts.filter(w => w.type !== 'rest');
    const allCompleted = trainable.length > 0 && trainable.every(w => state.completions[workoutCompletionKey(dk, w.workoutKey)]);

    const inProgram = d >= PROGRAM_START && d <= PROGRAM_END;

    let blocksHtml = '';
    if (!inProgram) {
      blocksHtml = ''; // outside program window — show nothing
    } else if (workouts.length === 0) {
      blocksHtml = `<div style="font-size:12px;color:var(--ink-3);margin-top:4px">Nothing scheduled</div>`;
    } else {
      blocksHtml = workouts.filter(w => w.type !== 'rest' && w.type !== 'pre-program').map(w => {
        const wKind = w.type === 'lift' ? 'lift' : (w.type === 'cardio' ? w.category : (w.kind || 'other'));
        const compKey = workoutCompletionKey(dk, w.workoutKey);
        const wDone = !!state.completions[compKey];
        const mins = approximateTime(w);
        let titleLine = '';
        if (w.type === 'lift' || w.kind === 'lift') {
          titleLine = w.title || 'Lift';
        } else if (w.type === 'cardio' || w.kind === 'run' || w.kind === 'swim') {
          const p = w.plan || {};
          const dist = p.totalDistance || p.distance || '';
          titleLine = dist || (wKind === 'swim' ? 'Swim' : 'Run');
        } else if (w.kind === 'other') {
          titleLine = w.title || 'Other';
        }
        const body = `
          <div class="week-block-title">${titleLine}</div>
          ${mins ? `<div class="week-block-meta">Approx. time: ${mins} min</div>` : ''}
        `;
        return `
          <div class="week-day-block ${wDone ? 'done' : ''}">
            <span class="pill ${wKind}">${kindLabel(wKind, w)}</span>
            ${body}
          </div>
        `;
      }).join('');
      // If after filtering rest, nothing remains, show "rest" text once (only within program)
      if (!blocksHtml && inProgram) {
        blocksHtml = `<div style="font-size:12px;color:var(--ink-3);margin-top:6px;font-style:italic">Rest day</div>`;
      }
    }

    days.push(`
      <div class="week-day ${isToday ? 'today' : ''} ${allCompleted ? 'completed' : ''}" data-day="${dk}">
        ${allCompleted ? `<div class="check-stamp">${I.check}</div>` : ''}
        ${hasNotes ? I.pen.replace('class="icon"', 'class="pen-icon"') : ''}
        <div class="head">
          <span class="dow">${dowName}</span>
          <span class="dom">${d.getDate()}</span>
        </div>
        ${blocksHtml}
      </div>
    `);
  }
  return `<div class="week-grid">${days.join('')}</div>`;
}

function wireWeek() {
  document.querySelectorAll('[data-day]').forEach(el => {
    el.onclick = () => {
      const [y, m, d] = el.dataset.day.split('-').map(Number);
      state.cursor = new Date(y, m - 1, d);
      state.view = 'day';
      render();
    };
  });
}

// ============================================================
// MONTH VIEW
// ============================================================
function renderMonth() {
  const cur = state.cursor;
  const year = cur.getFullYear(), month = cur.getMonth();
  const first = new Date(year, month, 1);
  const dowFirst = first.getDay();
  const offset = dowFirst === 0 ? 6 : dowFirst - 1;
  const start = addDays(first, -offset);

  const today = new Date();
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = addDays(start, i);
    const dk = dateKey(d);
    const workouts = getWorkoutsForDate(d);
    const inMonth = d.getMonth() === month;
    const isToday = isSameDay(d, today);
    const hasNotes = (state.notes[dk] || '').trim().length > 0;
    const trainable = workouts.filter(w => w.type !== 'rest');
    const allCompleted = trainable.length > 0 && trainable.every(w => state.completions[workoutCompletionKey(dk, w.workoutKey)]);

    const pills = workouts.filter(w => w.type !== 'rest' && w.type !== 'pre-program').map(w => {
      const wKind = w.type === 'lift' ? 'lift' : (w.type === 'cardio' ? w.category : (w.kind || 'other'));
      let label = kindLabel(wKind, w);
      // For lifts we use category sub-label
      if (w.type === 'lift' && w.category === 'glutes') label = 'Glutes';
      else if (w.type === 'lift' && w.category === 'quads') label = 'Quads';
      else if (w.type === 'lift' && w.category === 'upper') label = 'Upper';
      return `<span class="pill ${wKind}">${label}</span>`;
    }).join('');

    cells.push(`
      <div class="month-cell ${inMonth ? '' : 'other-month'} ${isToday ? 'today' : ''} ${allCompleted ? 'completed' : ''}" data-day="${dk}">
        ${allCompleted ? `<div class="check-stamp">${I.check}</div>` : ''}
        ${hasNotes ? I.pen.replace('class="icon"', 'class="pen-icon"') : ''}
        <div class="num">${d.getDate()}</div>
        ${pills}
      </div>
    `);
  }

  return `
    <div class="month-header">
      <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
    </div>
    <div class="month-grid">${cells.join('')}</div>
  `;
}

function wireMonth() {
  document.querySelectorAll('.month-cell[data-day]').forEach(el => {
    el.onclick = () => {
      const [y, m, d] = el.dataset.day.split('-').map(Number);
      state.cursor = new Date(y, m - 1, d);
      state.view = 'day';
      render();
    };
  });
}

function openAddWorkoutModal(date, prefill = null) {
  const editing = !!prefill;
  let kind = (prefill && prefill.kind) || 'lift';

  function build() {
    const overlay = openModal(`
      <div class="modal-head">
        <h2>${editing ? 'Edit workout' : 'Add a workout'}</h2>
        <button class="close" data-close>${I.x}</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-label">Type</div>
          <div class="kind-toggle">
            <button class="kind-opt ${kind === 'run' ? 'active' : ''}" data-kind="run">Run</button>
            <button class="kind-opt ${kind === 'swim' ? 'active' : ''}" data-kind="swim">Swim</button>
            <button class="kind-opt ${kind === 'lift' ? 'active' : ''}" data-kind="lift">Lift</button>
            <button class="kind-opt ${kind === 'other' ? 'active' : ''}" data-kind="other">Other</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-label">Title</div>
          <input class="form-input" id="add-title" placeholder="${kindPlaceholder(kind)}" value="${prefill?.title ? String(prefill.title).replace(/"/g, '&quot;') : ''}"/>
        </div>
        ${kind === 'run' || kind === 'swim' ? `
          <div class="form-row form-grid-2">
            <div>
              <div class="form-label">Distance</div>
              <input class="form-input" id="add-distance" placeholder="${kind === 'run' ? '2 mi' : '500 yd'}" value="${prefill?.plan?.distance || prefill?.plan?.totalDistance || ''}"/>
            </div>
            <div>
              <div class="form-label">Duration</div>
              <input class="form-input" id="add-duration" placeholder="~30 min" value="${prefill?.plan?.duration || ''}"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">Pace</div>
            <input class="form-input" id="add-pace" placeholder="${kind === 'run' ? 'easy / 11:00 mi' : 'easy / steady'}" value="${prefill?.plan?.pace || ''}"/>
          </div>
        ` : ''}
        <div class="form-row">
          <div class="form-label">${kind === 'lift' ? 'Notes / what to focus on' : 'Details'}</div>
          <textarea class="form-input form-textarea" id="add-details" placeholder="${kind === 'other' ? 'Yoga class, hike, soccer game, anything...' : 'Optional details...'}">${prefill?.details || prefill?.plan?.notes || ''}</textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-ghost" data-cancel>Cancel</button>
        <button class="btn-primary" data-save>${editing ? 'Save changes' : 'Add workout'}</button>
      </div>
    `, { small: true });

    overlay.querySelector('[data-close]').onclick = () => closeModal();
    overlay.querySelector('[data-cancel]').onclick = () => closeModal();
    overlay.querySelectorAll('[data-kind]').forEach(b => {
      b.onclick = () => { kind = b.dataset.kind; build(); };
    });
    overlay.querySelector('[data-save]').onclick = async () => {
      const title = (overlay.querySelector('#add-title')?.value || '').trim() || kindDefaultTitle(kind);
      const details = (overlay.querySelector('#add-details')?.value || '').trim();
      let workout = { kind, title };
      if (kind === 'run' || kind === 'swim') {
        const dist = (overlay.querySelector('#add-distance')?.value || '').trim();
        const dur = (overlay.querySelector('#add-duration')?.value || '').trim();
        const pace = (overlay.querySelector('#add-pace')?.value || '').trim();
        workout.type = 'cardio';
        workout.category = kind;
        workout.plan = { type: title, distance: dist, totalDistance: kind === 'swim' ? dist : undefined, duration: dur, pace, notes: details };
      } else if (kind === 'lift') {
        workout.type = 'lift';
        workout.details = details;
        // Preserve exercises if editing/converting from an existing lift; otherwise empty
        if (prefill && Array.isArray(prefill.exercises) && prefill.exercises.length > 0) {
          workout.exercises = [...prefill.exercises];
        } else {
          workout.exercises = [];
        }
        if (prefill && prefill.week) workout.week = prefill.week;
      } else {
        workout.type = 'other';
        workout.details = details;
      }
      if (editing && prefill && prefill._editKey) {
        // Update in place
        const dk = dateKey(date);
        const idx = parseInt(prefill._editKey.slice(1));
        if (state.customWorkouts[dk] && state.customWorkouts[dk][idx]) {
          // Preserve id
          workout.id = state.customWorkouts[dk][idx].id;
          state.customWorkouts[dk][idx] = workout;
        }
      } else {
        // If we're converting an auto workout to custom, hide the auto first
        if (prefill && prefill._convertingAuto) {
          state.hiddenAuto[dateKey(date)] = true;
        }
        addCustomWorkout(date, workout);
      }
      await saveState();
      closeModal();
      render();
      toast(editing ? 'Workout updated.' : 'Workout added.');
    };
  }
  build();
}

function kindPlaceholder(kind) {
  if (kind === 'run') return 'Easy 2-mile run';
  if (kind === 'swim') return '500 yd freestyle';
  if (kind === 'lift') return 'Upper body session';
  return 'Yoga / hike / sport';
}
function kindDefaultTitle(kind) {
  if (kind === 'run') return 'Run';
  if (kind === 'swim') return 'Swim';
  if (kind === 'lift') return 'Lift';
  return 'Other';
}

function openEditWorkoutModal(date, wKey) {
  const dk = dateKey(date);
  if (wKey === 'auto') {
    // Editing an auto workout converts it into a custom one (and hides the auto).
    const auto = generateWorkoutForDate(date);
    if (!auto || (auto.type !== 'lift' && auto.type !== 'cardio')) {
      toast('Nothing to edit on this day.');
      return;
    }
    const prefill = {
      kind: auto.type === 'lift' ? 'lift' : auto.category,
      title: auto.title,
      details: '',
      _convertingAuto: true
    };
    if (auto.type === 'lift' && auto.exercises) {
      prefill.exercises = [...auto.exercises]; // preserve exercises
      prefill.week = auto.week;
    }
    if (auto.type === 'cardio' && auto.plan) {
      prefill.plan = {
        distance: auto.plan.distance,
        totalDistance: auto.plan.totalDistance,
        pace: auto.plan.pace,
        duration: auto.plan.duration
      };
    }
    openAddWorkoutModal(date, prefill);
    return;
  }
  const idx = parseInt(wKey.slice(1));
  const w = (state.customWorkouts[dk] || [])[idx];
  if (!w) return;
  openAddWorkoutModal(date, { ...w, _editKey: wKey });
}

function openDeleteWorkoutDialog(date, wKey) {
  const dk = dateKey(date);
  const all = getWorkoutsForDate(date);
  const w = all.find(x => x.workoutKey === wKey);
  if (!w) return;
  const label = workoutKindLabel(w);
  const isAuto = wKey === 'auto';
  confirmDialog(
    isAuto ? `Hide ${label}?` : `Delete ${label}?`,
    isAuto
      ? `This hides today's scheduled ${label.toLowerCase()}. You can restore it later from Settings.`
      : `This will delete this custom workout. Your animals and decorations stay safe.`,
    async () => {
      deleteWorkout(date, wKey);
      await saveState();
      render();
      toast(isAuto ? 'Hidden for today.' : 'Workout deleted.');
    },
    { danger: true }
  );
}

function openMoveWorkoutModal(date, wKey) {

// ============================================================
function openAddExerciseModal(date, wKey) {
  const dk = dateKey(date);
  const current = new Set(getEffectiveExercises(date, wKey));
  const groups = { glutes: [], hamstrings: [], quads: [], calves: [], upper: [], core: [] };
  Object.entries(EXERCISE_LIBRARY).forEach(([id, def]) => {
    if (def.isCardio) return;
    if (current.has(id)) return;
    const g = def.muscleGroup;
    if (groups[g]) groups[g].push({ id, name: def.name, primary: def.primary });
  });

  const groupLabel = {
    glutes: 'Glutes', hamstrings: 'Hamstrings', quads: 'Quads',
    calves: 'Calves', upper: 'Upper body', core: 'Core'
  };

  let html = `
    <div class="add-ex-custom-block">
      <button class="add-ex-custom-btn" id="create-custom-ex-btn">

      </button>

  Object.entries(groups).forEach(([g, items]) => {
    if (!items.length) return;
    html += `<div class="add-ex-group"><div class="add-ex-group-label">${groupLabel[g]}</div>`;
    items.sort((a, b) => a.name.localeCompare(b.name));
    items.forEach(item => {
      html += `
        <button class="add-ex-option" data-add-ex-pick="${item.id}">
          <div class="add-ex-option-name">${item.name}</div>
          <div class="add-ex-option-sub">${item.primary}</div>
        </button>
      `;
    });
    html += `</div>`;
  });

  const overlay = openModal(`
    <div class="modal-head">
      <h2>Add an exercise</h2>
      <button class="close" data-close>${I.x}</button>
    </div>
    <div class="modal-body" style="max-height:60vh;overflow-y:auto">

  `, { small: true });

  };

    btn.onclick = async () => {

      <div class="library-group">

function renderPokedex() {
  const stats = getProgressStats();
  const owned = Object.keys(state.cardCollection).length;
  const total = 151;

  // Pending weekly bonus packs
  const bonusAvailable = Object.entries(state.weeklyBonusClaimed)
    .filter(([,v]) => v === 'available').length;

  // Filter & sort pokemon list
  let list = [...POKEMON];
  if (state.pokedexFilter === 'owned')   list = list.filter(p => state.cardCollection[p.id]);
  if (state.pokedexFilter === 'unowned') list = list.filter(p => !state.cardCollection[p.id]);
  if (state.pokedexSort === 'rarity') {
    const order = { ultra:0, rare:1, uncommon:2, common:3 };
    list.sort((a,b) => order[a.r] - order[b.r] || a.id - b.id);
  }

  const entries = list.map((p, listIdx) => {
    const col = state.cardCollection[p.id];
    const isOwned = !!col;
    const count = col ? col.count : 0;
    const hasShiny = col && col.shinyCount > 0;
    const rc = RARITY_CONFIG[p.r];
    return `
      <div class="pkdx-entry ${isOwned ? 'owned' : 'unowned'} rarity-${p.r}"
        data-pkdx-id="${p.id}" title="${p.name}"
        style="--entry-delay:${Math.min(listIdx * 20, 400)}ms">
        <div class="pkdx-sprite-wrap">
          <div class="pkdx-skeleton"></div>
          <img class="pkdx-sprite ${isOwned ? '' : 'silhouette'} sprite-loading"

            alt="${p.name}"
            loading="lazy"
            onload="this.classList.remove('sprite-loading');this.previousElementSibling.style.display='none'"

          ${hasShiny ? '<div class="pkdx-shiny-badge" title="Shiny unlocked!">★</div>' : ''}

        <div class="pkdx-rarity-dot" style="background:${rc.color}" title="${rc.label}"></div>
      </div>

  }).join('');

  // Empty state
  const emptyHtml = list.length === 0 ? `
    <div class="pkdx-empty">
      <svg viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100" height="84">

        state.pokedexFilter === 'owned'   ? 'Complete workouts to start catching Pokémon.' :
        state.pokedexFilter === 'unowned' ? 'You\'ve caught every Pokémon in this filter!' :
        state.pokedexRarity !== 'all'     ? 'No Pokémon match this rarity filter.' :
        'No Pokémon to show.'
      }</div>
    </div>
  ` : '';

  const caughtPct = Math.round((owned / total) * 100);

  return `

          <div class="pkdx-header-left">

function wirePokedex() {
  document.querySelectorAll('[data-back-cal]').forEach(b => b.onclick = () => {
    state.view = 'day';
    state.cursor = new Date();
    render();
  });
  document.querySelectorAll('[data-action]').forEach(b => b.onclick = () => handleAction(b.dataset.action));

  // Animate owned count on load
  const statNum = document.querySelector('.pkdx-stat-num');
  if (statNum) {
    const target = parseInt(statNum.textContent) || 0;
    if (target > 0) {
      let cur = 0;
      const step = Math.max(1, Math.floor(target / 24));
      const tick = setInterval(() => {
        cur = Math.min(cur + step, target);
        statNum.textContent = cur;
        if (cur >= target) clearInterval(tick);
      }, 30);
    }
  }

  // Scroll-linked header compression
  const grid = document.getElementById('pkdx-grid');
  const header = document.querySelector('.pkdx-header');
  if (grid && header) {
    let ticking = false;
    const onScroll = () => {
      if (!ticking) {
        requestAnimationFrame(() => {
          const scrollY = grid.parentElement ? grid.parentElement.scrollTop : window.scrollY;
          const compressed = scrollY > 60;
          header.classList.toggle('compressed', compressed);
          ticking = false;
        });
        ticking = true;
      }
    };
    // Use window scroll since the page scrolls naturally on mobile
    window.addEventListener('scroll', onScroll, { passive: true });
    document.querySelector('.pokedex-screen')?.addEventListener('scroll', onScroll, { passive: true });
  }

  // Overscroll bounce tint
  let overscrollTimer = null;
  window.addEventListener('scroll', () => {
    const atTop = window.scrollY <= 0;
    const atBottom = (window.innerHeight + window.scrollY) >= document.body.scrollHeight - 2;
    if (atTop || atBottom) {
      document.body.classList.add('overscroll-tint');
      clearTimeout(overscrollTimer);
      overscrollTimer = setTimeout(() => document.body.classList.remove('overscroll-tint'), 400);
    }
  }, { passive: true });
  let ptStartY = 0, ptPulling = false;
  const screen = document.querySelector('.pokedex-screen');
  if (screen) {
    screen.addEventListener('touchstart', e => {
      ptStartY = e.touches[0].clientY;
      ptPulling = window.scrollY === 0;
    }, { passive: true });
    screen.addEventListener('touchmove', e => {
      if (!ptPulling) return;
      const dy = e.touches[0].clientY - ptStartY;
      if (dy > 0) screen.style.transform = `translateY(${Math.min(dy * 0.35, 60)}px)`;
    }, { passive: true });
    screen.addEventListener('touchend', e => {
      screen.style.transform = '';
      screen.style.transition = 'transform 0.3s var(--ease)';
      setTimeout(() => { screen.style.transition = ''; }, 300);
      ptPulling = false;
    }, { passive: true });
  }

  document.querySelectorAll('[data-filter]').forEach(b => {
    b.onclick = () => { state.pokedexFilter = b.dataset.filter; render(); };
  });
  document.querySelectorAll('[data-sort]').forEach(b => {
    b.onclick = () => { state.pokedexSort = b.dataset.sort; render(); };
  });

  // Tap entry to open detail modal
  document.querySelectorAll('.pkdx-entry').forEach(el => {
    el.onclick = () => openPokedexEntry(parseInt(el.dataset.pkdxId));
  });

  if (claimBtn) {
    claimBtn.onclick = () => claimBonusPack();
  }
}

function openPokedexEntry(pokemonId) {
  const p = pkmnById(pokemonId);
  if (!p) return;
  const col = state.cardCollection[pokemonId];
  const isOwned = !!col;
  const rc = RARITY_CONFIG[p.r];

  const overlay = openModal(`
    <div class="modal-head">
      <h2>${isOwned ? p.name : '???'}</h2>
      <button class="close" data-close>${I.x}</button>
    </div>
    <div class="modal-body" style="text-align:center">
      <div style="position:relative;display:inline-block;margin-bottom:12px">
        <img
          src="${isOwned && col.shinyCount > 0 ? spriteUrl(pokemonId, true) : spriteUrl(pokemonId, false)}"
          alt="${p.name}"
          class="${isOwned ? '' : 'silhouette'}"
          style="width:120px;height:120px;object-fit:contain;image-rendering:pixelated"
          onerror="this.src='${staticSpriteUrl(pokemonId)}'"
        />
      </div>
      <div style="font-size:13px;color:var(--ink-3);margin-bottom:6px">#${String(p.id).padStart(3,'0')}</div>
      <div style="display:flex;justify-content:center;gap:6px;margin-bottom:10px">
        ${typePills(p.t)}
      </div>
      <div style="display:inline-block;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:700;background:${rc.color}22;color:${rc.color};margin-bottom:16px">${rc.label}</div>
      ${isOwned ? `
        <div style="display:flex;justify-content:center;gap:24px;margin-top:4px">
          <div style="text-align:center">
            <div style="font-size:22px;font-weight:700">${col.count}</div>
            <div style="font-size:11px;color:var(--ink-3)">caught</div>
          </div>
          ${col.shinyCount > 0 ? `
            <div style="text-align:center">
              <div style="font-size:22px;font-weight:700;color:#B8860B">★ ${col.shinyCount}</div>
              <div style="font-size:11px;color:var(--ink-3)">shiny</div>
            </div>
          ` : `
            <div style="text-align:center">
              <div style="font-size:13px;color:var(--ink-3)">${5 - (col.count % 5)} more for shiny</div>
            </div>
          `}
        </div>
      ` : '<div style="color:var(--ink-3);font-size:13px">Not yet caught. Keep training!</div>'}
    </div>
  `, { small: true });
  overlay.querySelector('[data-close]').onclick = () => closeModal();
}

function claimBonusPack() {
  const wkKey = Object.keys(state.weeklyBonusClaimed).find(k => state.weeklyBonusClaimed[k] === 'available');
  if (!wkKey) return;
  state.weeklyBonusClaimed[wkKey] = 'claimed';
  // Lift odds for the weekly bonus, displayed as a unique 'weekly' pack type
  const cards = pullPack('lift', { guaranteeRare: true });
  registerPackCards(cards);
  state.packsOpened++;
  saveState();
  showPackOpening(cards, 'weekly', () => render());
}

// ============================================================
// PACK OPENING SYSTEM
// ============================================================
function showNextPack() {
  if (state.packsToOpen.length === 0) return;
  const { workoutType, guaranteeRare } = state.packsToOpen.shift();
  state.packsOpened++;
  const cards = pullPack(workoutType, { guaranteeRare });
  // Register cards to collection
  registerPackCards(cards);
  saveState();
  showPackOpening(cards, workoutType, () => {
    if (state.packsToOpen.length > 0) setTimeout(() => showNextPack(), 400);
  });
}

function registerPackCards(cards) {
  const prevOwned = Object.keys(state.cardCollection).length;
  cards.forEach(({ pokemonId, tier }) => {
    if (!state.cardCollection[pokemonId]) {
      state.cardCollection[pokemonId] = { count: 0, shinyCount: 0, firstPulled: dateKey(new Date()) };
    }
    state.cardCollection[pokemonId].count++;
    if (state.cardCollection[pokemonId].count % 5 === 0) {
      state.cardCollection[pokemonId].shinyCount++;
    }
  });
  const newOwned = Object.keys(state.cardCollection).length;
  // Check milestones
  const milestones = [25, 50, 100, 151];
  for (const m of milestones) {
    if (prevOwned < m && newOwned >= m) {
      setTimeout(() => showPokedexMilestone(m), 1800); // after pack closes
      break;
    }
  }
}

function showPokedexMilestone(count) {
  const msgs = {
    25:  { title: 'Getting started!', sub: '25 Pokémon caught. The Pokédex is filling up.' },
    50:  { title: 'Halfway to 100!', sub: '50 Pokémon caught. You\'re on a roll.' },
    100: { title: 'Century caught!', sub: '100 Pokémon. Only 51 left to complete the Pokédex.' },
    151: { title: 'POKÉDEX COMPLETE!', sub: 'All 151 original Pokémon caught. Legendary trainer.' },
  };
  const { title, sub } = msgs[count] || { title: `${count} caught!`, sub: '' };

  const overlay = document.createElement('div');
  overlay.className = 'milestone-overlay';
  overlay.innerHTML = `
    <div class="milestone-card">
      <div class="milestone-icon">${count === 151 ? '🏆' : '⭐'}</div>
      <div class="milestone-title">${title}</div>
      <div class="milestone-num">${count} / 151</div>
      <div class="milestone-sub">${sub}</div>
      <button class="pack-close-btn" id="ms-close">Keep going</button>
    </div>
  `;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));
  overlay.querySelector('#ms-close').onclick = () => {
    overlay.classList.remove('visible');
    setTimeout(() => overlay.remove(), 300);
  };
}

function showPackOpening(cards, workoutType, onClose) {
  // Build annotated card list with isNew flag
  const rarityOrder = { common: 0, uncommon: 1, rare: 2, ultra: 3 };
  const annotatedCards = cards
    .map(c => ({
      ...c,
      isNew: state.cardCollection[c.pokemonId] && state.cardCollection[c.pokemonId].count === 1,
      pokemon: pkmnById(c.pokemonId),

    .sort((a, b) => rarityOrder[a.tier] - rarityOrder[b.tier]);

  const packColors = {
    swim:   ['#3A7BD5','#00D2FF'],
    lift:   ['#C97D5C','#F4C27A'],
    run:    ['#2ECC71','#1ABC9C'],
    other:  ['#8E44AD','#C39BD3'],
    weekly: ['#B8860B','#FFD700'],
  };

  const packIcons = {
    swim: `<svg viewBox="0 0 36 36" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
      <path d="M2 22c2.5 0 4-2 6.5-2s4 2 6.5 2 4-2 6.5-2 4 2 6.5 2"/>
      <path d="M2 28c2.5 0 4-2 6.5-2s4 2 6.5 2 4-2 6.5-2 4 2 6.5 2"/>
      <circle cx="26" cy="8" r="3"/>
      <path d="M10 18l5-8 4 4 4-6"/>
    </svg>`,
    lift: `<svg viewBox="0 0 36 36" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
      <line x1="4" y1="16" x2="32" y2="16"/>
      <rect x="2" y="13" width="4" height="6" rx="1"/>
      <rect x="30" y="13" width="4" height="6" rx="1"/>
      <rect x="7" y="11" width="4" height="10" rx="1"/>
      <rect x="25" y="11" width="4" height="10" rx="1"/>
      <line x1="18" y1="16" x2="18" y2="24"/>
      <path d="M15 24h6"/>
    </svg>`,
    run: `<svg viewBox="0 0 36 36" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
      <circle cx="22" cy="5" r="2.5"/>
      <path d="M20 9l-4 8H8"/>
      <path d="M16 17l2 7-5 5"/>
      <path d="M18 24l6 4"/>
      <path d="M22 9l4 3-3 5"/>
    </svg>`,
    other: `<svg viewBox="0 0 36 36" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
      <polygon points="18,4 22,14 33,14 24,21 27,32 18,25 9,32 12,21 3,14 14,14"/>
    </svg>`,
    weekly: `<svg viewBox="0 0 36 36" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="44" height="44">
      <path d="M6 4h24l-4 14H10L6 4z"/>
      <path d="M10 18c0 4.4 3.6 8 8 8s8-3.6 8-8"/>
      <path d="M4 4H2M34 4h2M13 32h10"/>
      <line x1="18" y1="26" x2="18" y2="32"/>
    </svg>`,
  };

  const [c1, c2] = packColors[workoutType] || packColors.lift;
  const packIcon = packIcons[workoutType] || packIcons.lift;
  const packLabel = workoutType === 'other'  ? 'Mystery Pack'
                  : workoutType === 'weekly' ? 'Weekly Bonus Pack'
                  : workoutType.charAt(0).toUpperCase() + workoutType.slice(1) + ' Pack';

  const packBg = workoutType === 'other'
    ? `background: radial-gradient(ellipse at 30% 30%, ${c2}, ${c1} 70%);`
    : workoutType === 'weekly'
    ? `background: linear-gradient(160deg, #7B5A00, #B8860B, #FFD700);`
    : `background: linear-gradient(160deg, ${c1}, ${c2});`;

  // Build overlay container
  const overlay = document.createElement('div');
  overlay.className = 'pack-overlay';

  const phase1 = document.createElement('div');
  phase1.className = 'pack-phase-1';
  phase1.innerHTML = `
    <div class="pack-rip-wrapper">
      <div class="pack-rip ${workoutType === 'other' ? 'pack-other' : ''}" style="--pack-c1:${c1};--pack-c2:${c2}">
        <div class="pack-half pack-top" style="${packBg}">
          <div class="pack-inner-top">
            <div class="pack-icon-wrap">${packIcon}</div>
          </div>
        </div>
        <div class="pack-half pack-bottom" style="${packBg}">
          <div class="pack-label">${packLabel}</div>
          <div class="pack-pokeball">
            <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
              <circle cx="40" cy="40" r="38" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
              <path d="M2 40 A38 38 0 0 1 78 40 Z" fill="rgba(0,0,0,0.12)"/>
              <line x1="2" y1="40" x2="78" y2="40" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
              <circle cx="40" cy="40" r="11" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
              <circle cx="40" cy="40" r="5" fill="rgba(255,255,255,0.3)"/>
            </svg>
          </div>
          <div class="pack-sublabel">10 cards</div>
        </div>
        <div class="pack-burst-ring"></div>
        ${workoutType === 'other'  ? '<div class="pack-starfield"></div>' : ''}
        ${workoutType === 'weekly' ? '<div class="pack-gold-shimmer"></div>' : ''}
      </div>
    </div>
    <div class="pack-tap-hint">Tap to open</div>
  `;

  // -- Phase 2: Card reveal --
  const phase2 = document.createElement('div');
  phase2.className = 'pack-phase-2';
  phase2.style.display = 'none';

  let currentCard = 0;

  function buildCardHtml(idx) {
    const card = annotatedCards[idx];
    const p = card.pokemon;
    const rc = RARITY_CONFIG[card.tier];
    const isRarePlus = card.tier === 'rare' || card.tier === 'ultra';

    const ballSvg = {
      common: `
        <svg viewBox="0 0 100 100" width="90" height="90" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 14px rgba(0,0,0,0.5))">
          <path d="M5,50 A45,45 0 0,1 95,50 Z" fill="#E3231A"/>
          <path d="M5,50 A45,45 0 0,0 95,50 Z" fill="#FAFAFA"/>
          <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="4"/>
          <rect x="5" y="46" width="90" height="8" fill="#1a1a1a"/>
          <circle cx="50" cy="50" r="13" fill="#1a1a1a"/>
          <circle cx="50" cy="50" r="9" fill="#FAFAFA"/>
          <circle cx="50" cy="50" r="5" fill="#D0D0D0"/>
          <path d="M18,26 Q32,15 48,18" stroke="rgba(255,255,255,0.28)" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>`,
      uncommon: `
        <svg viewBox="0 0 100 100" width="90" height="90" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 14px rgba(30,80,200,0.45))">
          <!-- Great Ball: blue top with red stripe arc -->
          <path d="M5,50 A45,45 0 0,1 95,50 Z" fill="#2255CC"/>
          <path d="M5,50 A45,45 0 0,0 95,50 Z" fill="#FAFAFA"/>
          <!-- Red arc stripe on top half -->
          <path d="M9,42 A45,45 0 0,1 91,42 Z" fill="#E3231A" clip-path="url(#topClip)"/>
          <clipPath id="topClip"><path d="M5,50 A45,45 0 0,1 95,50 Z"/></clipPath>
          <!-- Blue lower arc within top -->
          <path d="M14,50 A38,38 0 0,1 86,50 Z" fill="#2255CC" clip-path="url(#topClip)"/>
          <!-- Outline -->
          <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="4"/>
          <rect x="5" y="46" width="90" height="8" fill="#1a1a1a"/>
          <circle cx="50" cy="50" r="13" fill="#1a1a1a"/>
          <circle cx="50" cy="50" r="9" fill="#FAFAFA"/>
          <circle cx="50" cy="50" r="5" fill="#7BA0E8"/>
          <path d="M18,26 Q32,15 48,18" stroke="rgba(255,255,255,0.28)" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>`,
      rare: `
        <svg viewBox="0 0 100 100" width="90" height="90" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 16px rgba(220,180,0,0.55))">
          <!-- Ultra Ball: yellow top, black bottom -->
          <path d="M5,50 A45,45 0 0,1 95,50 Z" fill="#F5C400"/>
          <path d="M5,50 A45,45 0 0,0 95,50 Z" fill="#1a1a1a"/>
          <!-- Black band on top -->
          <path d="M5,50 A45,45 0 0,1 95,50 L88,50 A38,38 0 0,0 12,50 Z" fill="#1a1a1a"/>
          <!-- Yellow U-shape on top -->
          <path d="M12,50 A38,38 0 0,1 88,50 L82,50 A32,32 0 0,0 18,50 Z" fill="#F5C400"/>
          <!-- Outline -->
          <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="4"/>
          <rect x="5" y="46" width="90" height="8" fill="#1a1a1a"/>
          <circle cx="50" cy="50" r="13" fill="#1a1a1a"/>
          <circle cx="50" cy="50" r="9" fill="#FAFAFA"/>
          <circle cx="50" cy="50" r="5" fill="#F5C400"/>
          <path d="M18,24 Q32,13 48,16" stroke="rgba(255,255,255,0.22)" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>`,
      ultra: `
        <svg viewBox="0 0 100 100" width="90" height="90" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 20px rgba(160,60,220,0.7))">
          <!-- Master Ball: purple top and bottom -->
          <circle cx="50" cy="50" r="45" fill="#9B30C8"/>
          <path d="M5,50 A45,45 0 0,0 95,50 Z" fill="#7A20A8"/>
          <!-- M letter on top half -->
          <text x="50" y="40" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="-1">M</text>
          <!-- Two dots flanking M -->
          <circle cx="22" cy="30" r="5" fill="white"/>
          <circle cx="78" cy="30" r="5" fill="white"/>
          <!-- Outline -->
          <circle cx="50" cy="50" r="45" fill="none" stroke="#4a0a80" stroke-width="4"/>
          <rect x="5" y="46" width="90" height="8" fill="#4a0a80"/>
          <circle cx="50" cy="50" r="13" fill="#4a0a80"/>
          <circle cx="50" cy="50" r="9" fill="#FAFAFA"/>
          <circle cx="50" cy="50" r="5" fill="#CC88FF"/>
          <path d="M18,26 Q32,15 48,18" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>`,
    };

    return `
      <div class="card-flip-wrapper" id="pack-card-el">
        <div class="card-flip-inner">
          <div class="card-flip-back card-back-${card.tier}">
            ${ballSvg[card.tier] || ballSvg.common}
          </div>
          <div class="pack-card-reveal ${card.tier} card-flip-front">
            ${isRarePlus ? `<div class="card-shimmer ${card.tier === 'ultra' ? 'ultra' : ''}"></div>` : ''}
            <div class="card-rarity-label" style="color:${rc.color}">${rc.label}</div>
            <div class="card-sprite-wrap">
              <img class="card-sprite-img"
                src="${spriteUrl(p.id)}"
                alt="${p.name}"
                onerror="this.src='${staticSpriteUrl(p.id)}'"
              />
            </div>
            <div class="card-num">#${String(p.id).padStart(3,'0')}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-types">${typePills(p.t)}</div>
            ${card.isNew ? '<div class="card-new-badge">NEW!</div>' : ''}
          </div>
        </div>
      </div>
    `;
  }

  phase2.innerHTML = `
    <div class="pack-counter" id="pack-counter">1 / 10</div>
    <div id="pack-card-area">${buildCardHtml(0)}</div>
    <button class="pack-next-btn" id="pack-next-btn">Tap to reveal next</button>
  `;

  // -- Phase 3: Summary --
  const phase3 = document.createElement('div');
  phase3.className = 'pack-phase-3';
  phase3.style.display = 'none';

  function buildSummaryHtml() {
    const rows = annotatedCards.map(c => {
      const p = c.pokemon;
      const rc = RARITY_CONFIG[c.tier];
      return `
        <div class="summary-row">
          <img src="${staticSpriteUrl(p.id)}" alt="${p.name}" class="summary-sprite" onerror="this.style.opacity='0.3'"/>
          <div class="summary-info">
            <div class="summary-name">${p.name}</div>
            <div class="summary-tier" style="color:${rc.color}">${rc.label}</div>
          </div>
          ${c.isNew ? '<div class="summary-new">NEW</div>' : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="pack-summary-header">Pack complete!</div>
      <div class="pack-summary-list">${rows}</div>
      <button class="pack-close-btn" id="pack-close-btn">Close</button>
    `;
  }

  overlay.appendChild(phase1);
  overlay.appendChild(phase2);
  overlay.appendChild(phase3);
  document.body.appendChild(overlay);

  requestAnimationFrame(() => overlay.classList.add('visible'));

  // Phase 1 → tap or auto after 3s
  let phase1Done = false;
  function goToPhase2() {
    if (phase1Done) return;
    phase1Done = true;
    phase1.classList.add('ripping');
    setTimeout(() => {
      phase1.style.display = 'none';
      phase2.style.display = 'flex';
      // Flip the first card
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const el = phase2.querySelector('#pack-card-el');
        if (el) el.classList.add('flipped');
      }));
    }, 700);
  }
  phase1.addEventListener('click', goToPhase2);
  setTimeout(goToPhase2, 3000);

  // Phase 2 — reveal cards one at a time
  function revealNext() {
    currentCard++;
    if (currentCard >= 10) {
      // Go to summary
      phase2.style.display = 'none';
      phase3.innerHTML = buildSummaryHtml();
      phase3.style.display = 'flex';
      phase3.querySelector('#pack-close-btn').onclick = () => {
        overlay.classList.remove('visible');
        setTimeout(() => { overlay.remove(); if (onClose) onClose(); }, 300);
      };
      return;
    }
    const counter = phase2.querySelector('#pack-counter');
    const area = phase2.querySelector('#pack-card-area');
    if (counter) counter.textContent = `${currentCard + 1} / 10`;
    if (area) {
      area.innerHTML = buildCardHtml(currentCard);
      const el = area.querySelector('#pack-card-el');
      if (el) {
        // Trigger flip after a frame so the back-face paints first
        requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('flipped')));
      }
    }
    // Update button text for last card
    const btn = phase2.querySelector('#pack-next-btn');
    if (btn) btn.textContent = currentCard === 9 ? 'See summary' : 'Tap to reveal next';
  }

  // Click card area or next button
  phase2.addEventListener('click', (e) => {
    if (e.target.id === 'pack-next-btn' || e.target.closest('#pack-card-area') || e.target.closest('#pack-card-el')) {
      revealNext();
    }
  });
}

// ============================================================
// INIT
// ============================================================
async function init() {
  await loadState();
  state.cursor = new Date();
  state.view = 'day';
  render();
}

document.addEventListener('DOMContentLoaded', init);
